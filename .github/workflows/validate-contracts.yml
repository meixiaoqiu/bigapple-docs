name: Validate docs

on:
  push:
  pull_request:

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: npm ci
      - name: Build docs
        run: npm run build
      - name: Validate technical contracts
        run: npm run validate:contracts
